<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>급여 계산기</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#faf6ee;--card:#ffffff;--accent:#3a6df0;--as:rgba(58,109,240,.10);--green:#16a34a;--gs:rgba(22,163,74,.10);--orange:#ea580c;--os:rgba(234,88,12,.10);--red:#dc2626;--rs:rgba(220,38,38,.10);--purple:#7c3aed;--ps:rgba(124,58,237,.10);--text:#2d2a26;--dim:#6b6359;--border:#e5dfd2;--ibg:#fbf8f1}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;padding:0 16px 120px;overflow-x:hidden;font-size:15px}
.hd{text-align:center;padding:24px 0 8px}.hd h1{font-size:24px;font-weight:700;color:var(--text)}.hd p{font-size:14px;color:var(--dim);margin-top:6px}
.tb{display:flex;gap:4px;background:var(--card);border-radius:14px;padding:5px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.tb button{flex:1;padding:12px 0;text-align:center;font-size:14px;color:var(--dim);background:transparent;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-weight:500}
.tb button.on{font-weight:700;color:#fff;background:var(--accent)}
.cd{background:var(--card);border-radius:14px;padding:18px;margin-bottom:12px;border:1px solid var(--border);box-shadow:0 1px 2px rgba(0,0,0,.03)}
label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;display:block}
.iw{position:relative;margin-bottom:14px}
.iw input{width:100%;padding:13px 14px;font-size:16px;background:var(--ibg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none;min-height:48px}
.iw input:focus{border-color:var(--accent);background:#fff}
.iw .sf{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--dim);pointer-events:none;font-weight:600}
.rw{display:flex;gap:10px}.rw>div{flex:1}
.bt{width:100%;padding:14px;font-size:16px;font-weight:700;color:#fff;background:var(--accent);border:none;border-radius:12px;cursor:pointer;font-family:inherit;margin-top:4px;min-height:50px}
.bt:active{opacity:.85}.bt-g{background:var(--green)}.bt-o{background:var(--orange)}
.bs{width:auto;padding:9px 14px;font-size:13px;border-radius:8px;margin-top:0;min-height:38px;font-weight:600}
.ba{background:var(--as);color:var(--accent)}.bd{background:var(--rs);color:var(--red)}.bp{background:var(--ps);color:var(--purple)}
.br{display:flex;gap:8px;margin-top:4px}.br .bt{flex:1}
.bg{display:inline-block;font-size:11px;font-weight:700;border-radius:6px;padding:3px 8px;margin-left:5px;vertical-align:middle}
.bgg{color:var(--green);background:var(--gs)}.bgo{color:var(--orange);background:var(--os)}.bga{color:var(--accent);background:var(--as)}.bgr{color:var(--red);background:var(--rs)}.bgp{color:var(--purple);background:var(--ps)}
.nt{background:#fef9e7;border:1px solid #f5e6a8;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:14px;color:#7c5f0f;line-height:1.5}
.ec{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ec.res{opacity:.55}
.en{font-size:16px;font-weight:700}.ei{font-size:14px;color:var(--dim);margin-top:4px}.em{font-size:13px;color:var(--dim);margin-top:3px}
.ea{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.ey{text-align:center;padding:56px 20px;color:var(--dim);font-size:15px}
.ey small{font-size:13px;display:block;margin-top:6px}
.mp{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:18px}
.mp button{background:var(--as);color:var(--accent);border:none;border-radius:10px;padding:10px 18px;font-size:18px;font-weight:700;cursor:pointer;font-family:inherit;min-width:48px;min-height:44px}
.mp span{font-size:18px;font-weight:700;min-width:140px;text-align:center}
.pr{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.pl{font-size:14px;color:var(--dim)}.pv{font-size:14px;font-weight:600;color:var(--text)}
.tr{display:flex;justify-content:space-between;align-items:center;padding:14px 0 4px}
.tl{font-size:16px;font-weight:700}.tv{font-size:22px;font-weight:800;color:var(--accent)}
.gt{background:linear-gradient(135deg,#eef3ff,#fff);border:1.5px solid var(--accent)}
.seg{display:flex;gap:4px;margin-bottom:12px}
.seg button{flex:1;padding:11px;font-size:14px;font-weight:500;border:1.5px solid var(--border);border-radius:10px;background:var(--ibg);color:var(--dim);cursor:pointer;font-family:inherit;min-height:44px}
.seg button.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
.gseg{display:flex;gap:4px;margin-bottom:14px}
.gseg button{flex:1;padding:11px;font-size:14px;border:1.5px solid var(--border);border-radius:10px;background:var(--ibg);color:var(--dim);cursor:pointer;font-family:inherit;min-height:44px}
.gseg button.m.on{background:#dbeafe;color:var(--accent);border-color:var(--accent);font-weight:700}
.gseg button.f.on{background:#fed7aa;color:var(--orange);border-color:var(--orange);font-weight:700}
.fb{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.fb button{padding:9px 16px;font-size:13px;border:1.5px solid var(--border);border-radius:20px;background:#fff;color:var(--dim);cursor:pointer;font-family:inherit;font-weight:500;min-height:38px}
.fb button.on{background:var(--as);color:var(--accent);border-color:var(--accent);font-weight:700}
.ft{text-align:center;padding:24px 0 8px;font-size:12px;color:var(--dim)}
.ss{margin-top:14px}.ss h3{font-size:15px;font-weight:700;margin-bottom:10px;color:var(--text)}
.sbb{display:flex;flex-direction:column;gap:10px}.sbb .bt{font-size:15px}
input[type=file]{display:none}
.rc{background:var(--card);border-radius:12px;padding:18px;margin-bottom:10px;border:1px solid var(--border)}

/* Calendar */
.cal{background:var(--card);border-radius:14px;padding:14px;margin-bottom:14px;border:1px solid var(--border);box-shadow:0 1px 2px rgba(0,0,0,.03)}
.cal-hd{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:8px}
.cal-hd span{font-size:13px;font-weight:700;color:var(--dim);padding:4px 0}
.cal-hd span:first-child{color:var(--red)}
.cal-hd span:last-child{color:var(--accent)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;position:relative;font-size:16px;font-weight:600;color:var(--text);transition:all .15s;border:2px solid transparent}
.cal-cell:active{transform:scale(.93)}
.cal-cell.empty{cursor:default}
.cal-cell.empty:active{transform:none}
.cal-cell.sun{color:var(--red)}
.cal-cell.sat{color:var(--accent)}
.cal-cell.today{background:#fef3c7;font-weight:800}
.cal-cell.sel{border-color:var(--accent);background:var(--as)}
.cal-cell .dot{width:6px;height:6px;border-radius:50%;background:var(--green);position:absolute;bottom:4px}
.cal-cell .cnt{font-size:9px;color:var(--green);position:absolute;bottom:2px;font-weight:700}
.dots{display:flex;gap:3px;position:absolute;bottom:4px;justify-content:center;flex-wrap:wrap;max-width:80%}
.dots span{width:6px;height:6px;border-radius:50%;display:block}
.legend{display:flex;flex-wrap:wrap;gap:10px;padding:10px 4px;margin-bottom:14px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text);font-weight:500}
.leg-dot{width:12px;height:12px;border-radius:50%;display:inline-block;flex-shrink:0}
.emp-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.emp-chip{padding:11px 16px;font-size:14px;font-weight:600;border:2px solid var(--border);border-radius:22px;background:#fff;color:var(--dim);cursor:pointer;font-family:inherit;min-height:44px}
.emp-chip:active{transform:scale(.96)}
.emp-chip.on{font-weight:700}
.time-disp{flex:1;min-width:0;padding:13px;font-size:16px;font-weight:700;background:#fff;border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;cursor:pointer;min-height:48px;text-align:center}
.time-disp.emp-ty{color:var(--dim);font-weight:500}
.time-disp:active{border-color:var(--accent);background:var(--ibg)}
.time-del{flex-shrink:0;width:44px;height:48px;font-size:16px;background:var(--rs);color:var(--red);border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:700}
.time-del:active{opacity:.7}
.tp-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.tp-box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px;width:100%;max-width:360px;box-shadow:0 10px 40px rgba(0,0,0,.15)}
.tp-title{font-size:17px;font-weight:700;margin-bottom:16px;text-align:center}
.tp-ampm{display:flex;gap:8px;margin-bottom:16px}
.tp-ampm .tp-btn{flex:1;padding:13px;font-size:15px}
.tp-lbl{font-size:13px;color:var(--dim);font-weight:600;margin-bottom:8px}
.tp-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:16px}
.tp-btn{padding:13px 0;font-size:15px;font-weight:600;background:var(--ibg);color:var(--text);border:1.5px solid var(--border);border-radius:9px;cursor:pointer;font-family:inherit;min-height:46px}
.tp-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
.tp-btn:active{transform:scale(.94)}
.tp-cancel{width:100%;padding:14px;font-size:15px;font-weight:700;background:var(--rs);color:var(--red);border:none;border-radius:10px;cursor:pointer;font-family:inherit;min-height:48px}

/* Day detail panel */
.dp{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid var(--accent)}
.dp-title{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.dp-close{background:var(--rs);color:var(--red);border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.emp-row{background:var(--ibg);border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid var(--border)}
.emp-row-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.emp-row-nm{font-size:14px;font-weight:600}
.emp-row-hrs{font-size:13px;font-weight:700;color:var(--green)}
.time-row{display:flex;align-items:center;gap:8px}
.time-row input[type=time]{flex:1;min-width:0;width:100%;padding:10px 10px;font-size:16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;outline:none;-webkit-appearance:none;min-height:44px;text-align:center}
.time-row input[type=time]::-webkit-date-and-time-value{text-align:center}
.time-row input[type=time]:focus{border-color:var(--accent)}
.time-row .sep{color:var(--dim);font-weight:600;flex-shrink:0}
.hol-chk{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:var(--dim)}
.hol-chk input{width:16px;height:16px;accent-color:var(--red)}
.sub-info{font-size:11px;color:var(--dim);margin-top:6px}
.sub-info span{color:var(--orange)}

/* Summary cards */
.sum-card{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:8px;border:1px solid var(--border);cursor:pointer}
.sum-card .ch{display:flex;justify-content:space-between;align-items:center}
.sum-card .det{margin-top:12px;border-top:1px solid var(--border);padding-top:12px}
.ws{background:var(--as);border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:12px;color:var(--accent)}
.ws.ok{background:var(--gs);color:var(--green)}
</style>
</head>
<body>
<div class="hd"><h1>급여 계산기</h1><p>출퇴근 기록 · 자동 급여 계산</p></div>
<div class="tb" id="tabBar"></div>
<div id="content"></div>
<div class="ft" id="footerNote">최저시급 · 야간(22~06시) 50% · 연장(8h초과) 50%</div>
<input type="file" id="rfi" accept=".wagebak,.json">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
var SK="wage-v6",TABS=["직원관리","급여계산","기록보기","설정"],DN=["일","월","화","수","목","금","토"];
// 연도별 최저시급 (새 연도 확정 시 한 줄만 추가하세요)
var MIN_WAGE={2023:9620,2024:9860,2025:10030,2026:10320};
function getMinWage(){
  var y=new Date().getFullYear();
  if(MIN_WAGE[y])return MIN_WAGE[y];
  // 해당 연도 값이 없으면 가장 최근 연도 값 사용
  var years=Object.keys(MIN_WAGE).map(Number).sort(function(a,b){return b-a});
  return MIN_WAGE[years[0]];
}
function fmtComma(v){var n=String(v).replace(/[^0-9]/g,"");return n?Number(n).toLocaleString("ko-KR"):"";}
function fmtPhone(v){
  var n=String(v).replace(/[^0-9]/g,"").slice(0,11);
  if(n.length<4)return n;
  if(n.length<8)return n.slice(0,3)+"-"+n.slice(3);
  if(n.length===10)return n.slice(0,3)+"-"+n.slice(3,6)+"-"+n.slice(6);
  return n.slice(0,3)+"-"+n.slice(3,7)+"-"+n.slice(7);
}
var EMP_COLORS=["#6c8cff","#34d399","#fb923c","#f87171","#a78bfa","#f472b6","#38bdf8","#fbbf24","#4ade80","#e879f9","#22d3ee","#ef4444","#84cc16","#c084fc"];
function empColor(idx){return EMP_COLORS[idx%EMP_COLORS.length]}
var S={tab:0,emps:[],recs:[],logs:{},deds:{},showForm:false,editId:null,selDay:null,expSum:null,expRec:null,
  month:(function(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")})(),
  filter:"active"};
var fGender="male";

function load(){try{var d=JSON.parse(localStorage.getItem(SK));if(d){S.emps=d.emps||[];S.recs=d.recs||[];S.logs=d.logs||{};S.deds=d.deds||{};migrate()}}catch(e){}}
function migrate(){
  S.emps.forEach(function(e){
    if(!e.wageHistory||!e.wageHistory.length){
      e.wageHistory=[{date:"2000-01-01",wage:e.wage||getMinWage()}];
    }else{
      // 월 단위 이력을 일 단위로 변환
      e.wageHistory=e.wageHistory.map(function(wh){
        if(wh.month&&!wh.date)return{date:wh.month+"-01",wage:wh.wage};
        return wh;
      });
    }
  });
}
function sv(){localStorage.setItem(SK,JSON.stringify({emps:S.emps,recs:S.recs,logs:S.logs,deds:S.deds}))}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fm(n){return Math.round(n).toLocaleString("ko-KR")}
function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function dim(mo){var p=mo.split("-");return new Date(+p[0],+p[1],0).getDate()}
function dow(mo,d){var p=mo.split("-");return new Date(+p[0],+p[1]-1,d).getDay()}
function todayStr(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+d.getDate()}

function overlap(a,b,c,d){return Math.max(0,Math.min(b,d)-Math.max(a,c))}
function calcDay(st,en,brk){
  if(!st||!en)return{total:0,night:0,ot:0};
  var a=st.split(":"),b=en.split(":");
  var sm=+a[0]*60+(+a[1]),em=+b[0]*60+(+b[1]);
  if(em<=sm)em+=1440;
  var tot=(em-sm-(brk||0))/60;if(tot<0)tot=0;
  var nm=overlap(sm,em,0,360)+overlap(sm,em,1320,1440)+overlap(sm,em,1440,1800);
  return{total:Math.round(tot*100)/100,night:Math.round(nm/60*100)/100,ot:Math.round(Math.max(0,tot-8)*100)/100};
}

function getLog(eid,mo,d){var k=eid+"_"+mo;return(S.logs[k]||{})[d]||{}}
function setLogEntry(eid,mo,d,key,val){
  var k=eid+"_"+mo;if(!S.logs[k])S.logs[k]={};if(!S.logs[k][d])S.logs[k][d]={};
  S.logs[k][d][key]=val;sv();
}
function dayHasData(mo,d){
  var found=false;
  activeE().forEach(function(e){var l=getLog(e.id,mo,d);if(l.start&&l.end)found=true;});
  return found;
}
function dayEmpCount(mo,d){
  var c=0;activeE().forEach(function(e){var l=getLog(e.id,mo,d);if(l.start&&l.end)c++;});return c;
}
function dayEmpColors(mo,d){
  var colors=[];var emps=activeE();
  emps.forEach(function(e,i){var l=getLog(e.id,mo,d);if(l.start&&l.end)colors.push(empColor(i));});
  return colors;
}

function calcMonthPay(e,mo){
  if(e.status==="resigned")return{base:0,weekly:0,night:0,ot:0,hol:0,total:0,weeks:[],details:[],wage:0};
  var days=dim(mo),brk=e.breakMin||0,weeks={},details=[];
  for(var d=1;d<=days;d++){
    var l=getLog(e.id,mo,d),dc=calcDay(l.start||"",l.end||"",brk);
    var dw=dow(mo,d),wk=Math.ceil(d/7);
    var dayWage=wageForDate(e,mo+"-"+String(d).padStart(2,"0"));
    if(!weeks[wk])weeks[wk]={hours:0,days:0,lastWage:dayWage};
    if(dc.total>0){weeks[wk].hours+=dc.total;weeks[wk].days++;weeks[wk].lastWage=dayWage;}
    details.push({day:d,dow:dw,start:l.start||"",end:l.end||"",isHol:!!l.isHol,total:dc.total,night:dc.night,ot:dc.ot,wage:dayWage});
  }
  var base=0,nightP=0,otP=0,holP=0,weeklyP=0;
  details.forEach(function(dd){if(dd.total>0){
    var w=dd.wage;
    if(dd.isHol){base+=dd.total*w;var r8=Math.min(dd.total,8),ex=Math.max(0,dd.total-8);holP+=r8*w*0.5+ex*w;nightP+=dd.night*w*0.5;}
    else{base+=dd.total*w;nightP+=dd.night*w*0.5;otP+=dd.ot*w*0.5;}
  }});
  var wkInfo=[];
  for(var w2 in weeks){var ww=weeks[w2];var el=ww.hours>=15&&ww.days>=1;var wp=el?(ww.hours/ww.days)*ww.lastWage:0;weeklyP+=wp;
    wkInfo.push({week:+w2,hours:Math.round(ww.hours*10)/10,days:ww.days,pay:wp,ok:el});}
  return{base:base,weekly:weeklyP,night:nightP,ot:otP,hol:holP,total:base+nightP+otP+holP+weeklyP,weeks:wkInfo,details:details,wage:wageForMonth(e,mo)};
}
function activeE(){return S.emps.filter(function(e){return e.status==="active"})}

// 해당 날짜에 적용되는 시급 반환 (시급 이력 기반)
function wageForDate(e,dateStr){
  if(e.wageHistory&&e.wageHistory.length){
    var sorted=e.wageHistory.slice().sort(function(a,b){return a.date<b.date?-1:1});
    var applicable=null;
    sorted.forEach(function(wh){if(wh.date<=dateStr)applicable=wh.wage;});
    if(applicable!==null)return applicable;
    return sorted[0].wage;
  }
  return e.wage||0;
}
// 해당 월의 대표 시급 (월초 기준, 목록 표시용)
function wageForMonth(e,mo){return wageForDate(e,mo+"-01")}

function render(){
  document.getElementById("tabBar").innerHTML=TABS.map(function(t,i){
    return'<button class="'+(S.tab===i?"on":"")+'" onclick="setTab('+i+')">'+t+'</button>';}).join("");
  var c=document.getElementById("content");
  if(S.tab===0)c.innerHTML=rEmp();else if(S.tab===1)c.innerHTML=rCalc();else if(S.tab===2)c.innerHTML=rRec();else c.innerHTML=rSet();
}
function setTab(i){S.tab=i;S.showForm=false;S.editId=null;S.selDay=null;S.expSum=null;render()}

// ═══ 직원관리 ═══
function rEmp(){
  if(S.editId)return rForm(S.emps.find(function(e){return e.id===S.editId}),true);
  if(S.showForm)return rForm(null,false);

}

function svE(isEd){
  var nm=document.getElementById("fn").value.trim();if(!nm)return alert("이름을 입력하세요");
  var newWage=Number(document.getElementById("fw").value.replace(/[^0-9]/g,""))||0;
  var hireDate=document.getElementById("fhd").value;
  var resignDate=document.getElementById("frd").value;
  var base={name:nm,gender:fGender,phone:document.getElementById("fph").value.trim(),address:document.getElementById("fad").value.trim(),
    wage:newWage,breakMin:Number(document.getElementById("fbr").value)||0,
    hireDate:hireDate,resignDate:resignDate,
    memo:document.getElementById("fme").value.trim()};
  if(isEd){
    var i=S.emps.findIndex(function(e){return e.id===S.editId});
    var old=S.emps[i];
    var hist=(old.wageHistory||[]).slice();
    if(!hist.length){hist.push({date:"2000-01-01",wage:old.wage});}
    // 시급이 바뀌었으면 적용일과 함께 이력 추가
    var effDate=document.getElementById("fwd").value;
    if(newWage!==old.wage&&effDate){
      hist=hist.filter(function(wh){return wh.date!==effDate});
      hist.push({date:effDate,wage:newWage});
    }
    // 퇴사일 입력 시 자동으로 퇴사 처리, 비우면 재직 유지
    var newStatus=old.status;
    if(resignDate&&old.status==="active")newStatus="resigned";
    if(!resignDate&&old.status==="resigned")newStatus=old.status; // 복직은 복직 버튼으로
    S.emps[i]=Object.assign({},old,base,{id:S.editId,status:newStatus,wageHistory:hist});
    S.editId=null;
  }else{
    S.emps.push(Object.assign({},base,{id:gid(),status:resignDate?"resigned":"active",wageHistory:[{date:"2000-01-01",wage:newWage}]}));
    S.showForm=false;
  }
  sv();render();
}

function selDay(d){S.selDay=d;render();if(d!==null)setTimeout(function(){var dp=document.querySelector(".dp");if(dp)dp.scrollIntoView({behavior:"smooth",block:"start"})},50)}
function isWorked(eid,day){
  var l=getLog(eid,S.month,day);
  return !!l.worked||!!(l.start&&l.end);
}
function tgWork(eid){
  var l=getLog(eid,S.month,S.selDay);
  if(isWorked(eid,S.selDay)){
    // uncheck: remove this day's record
    var k=eid+"_"+S.month;
    if(S.logs[k]&&S.logs[k][S.selDay]){delete S.logs[k][S.selDay];sv();}
  }else{
    setLogEntry(eid,S.month,S.selDay,"worked",true);
  }
  render();
}
function uL(eid,day,key,val){
  setLogEntry(eid,S.month,day,key,val);
  if(key==="start"||key==="end"){
    render();
  }else{
    render();
  }
}
// ─── 커스텀 시간 선택기 ───
var TP=null; // {eid,day,field,ampm,hour}
function fmtTime(hhmm){
  if(!hhmm)return"";
  var p=hhmm.split(":");var h=+p[0],m=p[1];
  var ap=h<12?"오전":"오후";
  var h12=h%12;if(h12===0)h12=12;
  return ap+" "+h12+":"+m;
}
function openTP(eid,day,field){
  var l=getLog(eid,S.month,day);
  var cur=field==="start"?(l.start||"07:00"):(l.end||"14:00");
  var p=cur.split(":");var h24=+p[0];
  TP={eid:eid,day:day,field:field,ampm:h24<12?"am":"pm",hour:h24%12===0?12:h24%12,min:p[1]};
  renderTP();
}
function closeTP(){TP=null;var ov=document.getElementById("tpOv");if(ov)ov.remove()}
function setTPampm(a){TP.ampm=a;renderTP()}
function setTPhour(hr){TP.hour=hr;renderTP()}
function setTPmin(mn){
  // 분 선택 → 즉시 저장 & 닫기
  var h24=TP.hour%12;if(TP.ampm==="pm")h24+=12;
  var val=String(h24).padStart(2,"0")+":"+mn;
  var eid=TP.eid,day=TP.day,field=TP.field;
  closeTP();
  uL(eid,day,field,val);
}
function clearTime(eid,day){
  var k=eid+"_"+S.month;
  if(S.logs[k]&&S.logs[k][day]){
    delete S.logs[k][day].start;
    delete S.logs[k][day].end;
    sv();
  }
  render();

// ─── 백업 암호화 (AES-256-GCM, Web Crypto API) ───
async function deriveKey(password,salt){
  var enc=new TextEncoder();
  var keyMat=await crypto.subtle.importKey("raw",enc.encode(password),{name:"PBKDF2"},false,["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:salt,iterations:200000,hash:"SHA-256"},
    keyMat,
    {name:"AES-GCM",length:256},
    false,
    ["encrypt","decrypt"]
  );
}
async function encryptData(plaintext,password){
  var salt=crypto.getRandomValues(new Uint8Array(16));
  var iv=crypto.getRandomValues(new Uint8Array(12));
  var key=await deriveKey(password,salt);
  var enc=new TextEncoder();
  var cipher=await crypto.subtle.encrypt({name:"AES-GCM",iv:iv},key,enc.encode(plaintext));
  // 헤더: 매직(WAGE) + salt(16) + iv(12) + ciphertext
  var out=new Uint8Array(4+16+12+cipher.byteLength);
  out.set([0x57,0x41,0x47,0x45],0); // "WAGE"
  out.set(salt,4);
  out.set(iv,20);
  out.set(new Uint8Array(cipher),32);
  return out;
}
async function decryptData(buf,password){
  if(buf.length<32)throw new Error("파일이 손상되었거나 백업 파일이 아닙니다.");
  // 매직 체크
  if(buf[0]!==0x57||buf[1]!==0x41||buf[2]!==0x47||buf[3]!==0x45)throw new Error("올바른 백업 파일이 아닙니다.");
  var salt=buf.slice(4,20);
  var iv=buf.slice(20,32);
  var cipher=buf.slice(32);
  var key=await deriveKey(password,salt);
  var plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,cipher);
  return new TextDecoder().decode(plain);
}
